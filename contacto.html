        <h3>Como podemos ayudarte?<br> Completa con tus datos y un representante se pondrá en contacto a la brevedad posible</h3>
        
        <form action="https://formspree.io/f/mdknqwqy" method="post">
            <label for="fname">Nombre:</label>
            <input type="text" id="fname" name="fname" /><br /><br />
            <label for="lname">Apellido:</label>
            <input type="text" id="lname" name="lname" /><br /><br />
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required /><br /><br />
            <label for="tipo">Institución / Empresa:</label>
            <input type="text" id="tipo" name="tipo" /><br /><br />
            <label for="cel">Telefono de Contacto:</label>
            <input type="text" id="cel" name="cel" /><br /><br />

            <label for="comentarios">Requerimiento:</label>
            <textarea name="comentarios" rows="5"></textarea>
            <br />
            
            <button type="submit">Enviar</button><br />

        </form>
